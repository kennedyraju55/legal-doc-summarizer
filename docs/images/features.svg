<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="bold">✨ Feature Highlights</text>

  <!-- Row 1 -->
  <!-- Card 1: Multi-Format Summarization -->
  <rect x="25" y="55" width="240" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#e94560" stroke-width="1.5"/>
  <text x="145" y="82" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="24">📋</text>
  <text x="145" y="105" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Multi-Format Summarization</text>
  <text x="145" y="125" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Bullet • Narrative • Detailed</text>
  <text x="145" y="143" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Parties, obligations, dates &amp; more</text>
  <text x="145" y="163" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="9">summarize_document()</text>

  <!-- Card 2: Clause Extraction -->
  <rect x="280" y="55" width="240" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#533483" stroke-width="1.5"/>
  <text x="400" y="82" text-anchor="middle" fill="#533483" font-family="Segoe UI,Arial,sans-serif" font-size="24">🔍</text>
  <text x="400" y="105" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Clause Extraction</text>
  <text x="400" y="125" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">7 Categories • Risk Levels</text>
  <text x="400" y="143" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Payment, Termination, IP &amp; more</text>
  <text x="400" y="163" text-anchor="middle" fill="#533483" font-family="Segoe UI,Arial,sans-serif" font-size="9">extract_clauses()</text>

  <!-- Card 3: Risk Scoring -->
  <rect x="535" y="55" width="240" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#e94560" stroke-width="1.5"/>
  <text x="655" y="82" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="24">⚠️</text>
  <text x="655" y="105" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Risk Scoring</text>
  <text x="655" y="125" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">5 Dimensions • 0-100 Overall</text>
  <text x="655" y="143" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Financial, IP, Compliance &amp; more</text>
  <text x="655" y="163" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="9">score_risks()</text>

  <!-- Row 2 -->
  <!-- Card 4: Document Comparison -->
  <rect x="25" y="195" width="240" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#533483" stroke-width="1.5"/>
  <text x="145" y="222" text-anchor="middle" fill="#533483" font-family="Segoe UI,Arial,sans-serif" font-size="24">📑</text>
  <text x="145" y="245" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Document Comparison</text>
  <text x="145" y="265" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Side-by-Side Analysis</text>
  <text x="145" y="283" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Multi-document diff &amp; insights</text>
  <text x="145" y="303" text-anchor="middle" fill="#533483" font-family="Segoe UI,Arial,sans-serif" font-size="9">compare_documents()</text>

  <!-- Card 5: Export Engine -->
  <rect x="280" y="195" width="240" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#e94560" stroke-width="1.5"/>
  <text x="400" y="222" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="24">💾</text>
  <text x="400" y="245" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Export Engine</text>
  <text x="400" y="265" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">PDF-Ready Markdown Output</text>
  <text x="400" y="283" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Formatted reports &amp; tables</text>
  <text x="400" y="303" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="9">generate_export_markdown()</text>

  <!-- Card 6: 100% Private -->
  <rect x="535" y="195" width="240" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#2ec4b6" stroke-width="1.5"/>
  <text x="655" y="222" text-anchor="middle" fill="#2ec4b6" font-family="Segoe UI,Arial,sans-serif" font-size="24">🔒</text>
  <text x="655" y="245" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">100% Private</text>
  <text x="655" y="265" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Local AI • No Cloud</text>
  <text x="655" y="283" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Your data never leaves your machine</text>
  <text x="655" y="303" text-anchor="middle" fill="#2ec4b6" font-family="Segoe UI,Arial,sans-serif" font-size="9">Ollama + Gemma 4</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="342" width="800" height="8" fill="url(#accent)" rx="0"/>
</svg>
