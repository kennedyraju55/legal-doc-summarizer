<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#e94560">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="bold">Architecture &amp; Data Flow</text>

  <!-- Box 1: Legal Document Input -->
  <rect x="20" y="140" width="130" height="80" rx="8" fill="none" stroke="#e94560" stroke-width="2"/>
  <text x="85" y="170" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">📄</text>
  <text x="85" y="192" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">Legal Document</text>
  <text x="85" y="208" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">PDF / TXT</text>

  <!-- Arrow 1→2 -->
  <line x1="150" y1="180" x2="175" y2="180" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 2: Text Extraction -->
  <rect x="180" y="140" width="130" height="80" rx="8" fill="none" stroke="#533483" stroke-width="2"/>
  <text x="245" y="170" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">📝</text>
  <text x="245" y="192" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">Text Extraction</text>
  <text x="245" y="208" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">PyPDF2 / pdfplumber</text>

  <!-- Arrow 2→3 -->
  <line x1="310" y1="180" x2="345" y2="180" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 3: LLM Processing (large center box) -->
  <rect x="350" y="60" width="200" height="300" rx="10" fill="rgba(233,69,96,0.08)" stroke="#e94560" stroke-width="2.5"/>
  <text x="450" y="90" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">🤖</text>
  <text x="450" y="112" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Gemma 4 via Ollama</text>

  <!-- Sub-process boxes inside Box 3 -->
  <rect x="370" y="125" width="160" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="#533483" stroke-width="1.5"/>
  <text x="450" y="147" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12">📋 Summarize</text>

  <rect x="370" y="170" width="160" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="#533483" stroke-width="1.5"/>
  <text x="450" y="192" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12">🔍 Extract Clauses</text>

  <rect x="370" y="215" width="160" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="#533483" stroke-width="1.5"/>
  <text x="450" y="237" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12">⚠️ Score Risks</text>

  <rect x="370" y="260" width="160" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="#533483" stroke-width="1.5"/>
  <text x="450" y="282" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12">📑 Compare Docs</text>

  <!-- Arrow 3→4 -->
  <line x1="550" y1="180" x2="585" y2="180" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 4: Structured Output -->
  <rect x="590" y="100" width="130" height="80" rx="8" fill="none" stroke="#e94560" stroke-width="2"/>
  <text x="655" y="130" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">📊</text>
  <text x="655" y="152" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">Structured Output</text>
  <text x="655" y="168" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Tables / Scores / JSON</text>

  <!-- Arrow 4→5 -->
  <line x1="655" y1="185" x2="655" y2="225" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 5: Export -->
  <rect x="590" y="230" width="130" height="80" rx="8" fill="none" stroke="#533483" stroke-width="2"/>
  <text x="655" y="260" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">💾</text>
  <text x="655" y="282" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">Export Engine</text>
  <text x="655" y="298" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Markdown / PDF</text>

  <!-- Config annotation -->
  <rect x="20" y="310" width="160" height="70" rx="8" fill="rgba(255,255,255,0.04)" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="4"/>
  <text x="100" y="335" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">⚙️ config.yaml</text>
  <text x="100" y="352" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">max_chars: 12,000</text>
  <text x="100" y="367" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">temperature: 0.3</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="392" width="800" height="8" fill="url(#accent)" rx="0"/>
</svg>
